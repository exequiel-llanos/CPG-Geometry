<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPC Geometría — Objetos Fundamentales</title>
<style>
:root{
  --v1:#3d3487;   /* violeta oscuro – estructura principal */
  --v2:#534ab7;   /* violeta medio – activo */
  --v3:#7b74cc;   /* violeta claro – hover */
  --vl:#eeedfe;   /* lavanda muy claro – fondos */
  --vb:#c8c3f0;   /* lavanda borde */
  --white:#ffffff;
  --light:#f6f5ff;
  --text:#1a1830;
  --sub:#4a4570;
  --muted:#8a86b0;
  --green:#2a6a3a; --red:#7a1a1a;
  --gold:#b8963e;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--light);color:var(--text)}

/* HEADER */
header{background:var(--v1);color:#fff;border-bottom:2px solid var(--vb)}
.htop{display:flex;align-items:center;justify-content:space-between;padding:11px 22px}
.hinst{display:flex;align-items:center;gap:11px}
.hbadge{width:34px;height:34px;background:var(--vb);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:var(--v1);flex-shrink:0}
.hinst h1{font-size:17px;font-weight:700;line-height:1.25;color:#fff}
.hinst p{font-size:16px;color:#c0bcf0;margin-top:1px}
.hmeta{text-align:right;font-size:16px;color:#c0bcf0;line-height:1.7}
.badge-cpc{background:var(--v2);color:#fff;font-size:15px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:.04em}

/* TABS */
.tabs{display:flex;background:var(--v2);padding:0 22px;overflow-x:auto}
.tab{padding:12px 16px;font-size:17px;font-weight:600;color:#c0bcf0;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;letter-spacing:.03em;transition:all .2s}
.tab:hover{color:#fff}
.tab.active{color:#fff;border-bottom:2px solid #fff}

/* LAYOUT */
main{display:flex;height:calc(100vh - 90px);overflow:hidden}
.cpanel{flex:1;display:flex;flex-direction:column;background:var(--white);border-right:1px solid var(--vb);position:relative;overflow:hidden}
canvas{flex:1;display:block}
.side{width:320px;display:flex;flex-direction:column;background:var(--white);overflow-y:auto}

/* DEFINITION BOX — matches beamer block */
.dbox{background:var(--v1);color:#fff;padding:14px 16px}
.dlbl{font-size:15px;font-weight:700;color:var(--vb);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.dbox h3{font-size:16px;font-weight:700;margin-bottom:5px}
.dbox p{font-size:17px;color:#d8d4f8;line-height:1.65}
.dbox em{color:#fff;font-style:normal;font-weight:600}

/* BLOCKS matching beamer */
.blk{border-radius:0;margin-bottom:7px}
.blk .bt{font-size:15px;font-weight:700;padding:4px 10px;background:var(--v2);color:#fff;font-family:'Segoe UI',Arial,sans-serif}
.blk .bb{font-size:16px;padding:7px 9px;line-height:1.6;background:var(--vl);color:var(--text);border:1px solid var(--vb);border-top:none}
.blk.alert .bt{background:var(--red)}
.blk.alert .bb{background:#fff0f0;border-color:#e0a0a0}
.blk.example .bt{background:var(--green)}
.blk.example .bb{background:#f0fff4;border-color:#a0d0a8}
.blk.warn .bt{background:var(--gold)}
.blk.warn .bb{background:#fffbf0;border-color:#e0cc80}

/* SECTION LABEL */
.slbl{font-size:15px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:11px 13px 4px}

/* CONTROLS */
.cwrap{padding:0 14px 14px}
.brow{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
.btn{padding:5px 10px;font-size:17px;border:1px solid var(--vb);border-radius:3px;background:var(--white);color:var(--sub);cursor:pointer;font-weight:600;transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--v2);color:var(--v2)}
.btn.on{background:var(--v2);color:#fff;border-color:var(--v2)}
.btn.sm{padding:4px 8px;font-size:16px}
.btn.clr{border-color:#ccc;color:#999}.btn.clr:hover{background:#eee}
label{font-size:16px;color:var(--sub);display:block;margin-bottom:3px}
input[type=range]{width:100%;accent-color:var(--v2);margin-bottom:9px}
.vv{font-size:16px;color:var(--v2);font-weight:700}
.pbox{background:var(--vl);border:1px solid var(--vb);border-left:3px solid var(--v2);border-radius:2px;padding:10px 12px;margin-bottom:7px;font-size:17px;color:var(--sub);line-height:1.7}
.pbox b{color:var(--v1)}
.pbox.gl{border-left-color:var(--green)}
.pbox.gr{border-left-color:var(--red)}
.pbox.gw{border-left-color:var(--gold)}
.div{height:1px;background:var(--vb);margin:5px 13px}

/* CPC LAYER */
.cpc-toggle{display:flex;align-items:center;gap:7px;padding:8px 13px;cursor:pointer;background:var(--vl);border-bottom:1px solid var(--vb)}
.cpc-toggle span{font-size:16px;font-weight:700;color:var(--v2);letter-spacing:.04em}
.cpc-toggle .pill{font-size:11px;background:var(--v2);color:#fff;padding:1px 7px;border-radius:10px}
.cpc-panel{display:none;background:var(--vl);border-bottom:1px solid var(--vb);padding:10px 13px}
.cpc-panel.open{display:block}
.cpc-q{font-size:17px;color:var(--text);line-height:1.6;margin-bottom:6px;padding-left:10px;border-left:2px solid var(--v3)}

/* QUIZ */
.qwrap{padding:13px}
.pbar{height:3px;background:var(--vb);border-radius:2px;margin-bottom:11px}
.pfill{height:3px;background:var(--v2);border-radius:2px;transition:width .4s}
.qq{font-size:15px;color:var(--text);line-height:1.6;margin-bottom:9px;font-weight:600}
.qopts{display:flex;flex-direction:column;gap:5px}
.qopt{padding:9px 12px;border:1px solid var(--vb);border-radius:3px;font-size:17px;cursor:pointer;transition:all .15s;background:var(--white);color:var(--text);text-align:left}
.qopt:hover{border-color:var(--v2);background:var(--vl)}
.qopt.ok{background:#eaf4ee;border-color:var(--green);color:var(--green)}
.qopt.no{background:#f8eaea;border-color:var(--red);color:var(--red)}
.qfb{font-size:17px;margin-top:7px;padding:9px 12px;border-radius:3px;line-height:1.55}
.qfb.ok{background:#eaf4ee;color:var(--green);border:1px solid #8acc9a}
.qfb.no{background:#f8eaea;color:var(--red);border:1px solid #d08080}
.qnx{margin-top:7px;width:100%}
.sbox{text-align:center;padding:22px 13px}
.sbox .big{font-size:48px;font-weight:700;color:var(--v1)}
.sbox .pct{font-size:16px;color:var(--v2);font-weight:700;margin-top:4px}
.sbox p{font-size:17px;color:var(--sub);margin-top:7px;line-height:1.6}

/* POSTULADO steps */
.stbox{background:var(--vl);border:1px solid var(--vb);border-radius:3px;padding:10px 12px;margin-bottom:6px;font-size:17px;color:var(--sub);line-height:1.6;cursor:pointer;transition:border-color .2s}
.stbox:hover{border-color:var(--v2)}
.stbox.ast{border-left:3px solid var(--v2);background:#eeedfe}
.stbox b{color:var(--v1);display:block;margin-bottom:2px;font-size:17px}
</style>
</head>
<body>
<header>
  <div class="htop">
    <div class="hinst">
      <div class="hbadge">FD</div>
      <div>
        <h1>Objetos Geométricos Fundamentales &nbsp;<span class="badge-cpc">CPC</span></h1>
        <p>Conocimiento Pedagógico del Contenido · Eje de Geometría · Clase 01</p>
      </div>
    </div>
    <div class="hmeta"><div>Formación Docente en Matemática</div><div>Prosecución de Estudios · Bases Curriculares · Chile</div></div>
  </div>
</header>
<div class="tabs">
  <div class="tab active" onclick="sw(0)">I. Punto</div>
  <div class="tab" onclick="sw(1)">II. Línea</div>
  <div class="tab" onclick="sw(2)">III. Plano</div>
  <div class="tab" onclick="sw(3)">IV. V Postulado</div>
  <div class="tab" onclick="sw(4)">V. Evaluación Docente</div>
</div>
<main>
  <div class="cpanel"><canvas id="cv"></canvas></div>
  <div class="side" id="side"></div>
</main>

<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const V1='#3d3487',V2='#534ab7',V3='#7b74cc',VL='#eeedfe',VB='#c8c3f0';
const MU='#8a86b0',GR='#2a6a3a',RE='#7a1a1a',GO='#b8963e';
let tab=0,af=null,st={};

function resize(){const p=cv.parentElement;cv.width=p.clientWidth;cv.height=p.clientHeight-2;draw();}
window.addEventListener('resize',resize);
function sw(i){tab=i;document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',i===j));if(af){cancelAnimationFrame(af);af=null;}cv.onmousedown=cv.onmousemove=cv.onmouseup=cv.onclick=null;st={};buildSide();draw();}
function draw(){if(tab===0)dPunto();else if(tab===1)dLinea();else if(tab===2)dPlano();else if(tab===3)dPost();else dQcv();}

function grid(s,c){const W=cv.width,H=cv.height;s=s||50;ctx.strokeStyle=c||'#eeedfe';ctx.lineWidth=0.7;for(let x=0;x<W;x+=s){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}for(let y=0;y<H;y+=s){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}}
function dot(x,y,r,c){ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=c;ctx.fill();}
function arr(x,y,d){ctx.fillStyle=V1;ctx.beginPath();if(d>0){ctx.moveTo(x,y);ctx.lineTo(x-10,y-5);ctx.lineTo(x-10,y+5);}else{ctx.moveTo(x,y);ctx.lineTo(x+10,y-5);ctx.lineTo(x+10,y+5);}ctx.closePath();ctx.fill();}

/* ── CPC TOGGLE COMPONENT ── */
function cpcHTML(id, qs){
  const items=qs.map(q=>`<div class="cpc-q">▸ ${q}</div>`).join('');
  return `<div class="cpc-toggle" onclick="tCPC('${id}')">
    <span>🎓 Reflexión docente (CPC)</span>
    <div class="pill" id="pill-${id}">▼</div>
  </div>
  <div class="cpc-panel" id="cpc-${id}">${items}</div>`;
}
function tCPC(id){
  const p=document.getElementById('cpc-'+id);
  const pill=document.getElementById('pill-'+id);
  const open=p.classList.toggle('open');
  pill.textContent=open?'▲':'▼';
}

/* ════════════════════════════════════════
   I. PUNTO
════════════════════════════════════════ */
function bPunto(){
  document.getElementById('side').innerHTML=`
  <div class="dbox">
    <div class="dlbl">Definición — Punto (Dim. 0)</div>
    <h3>El objeto sin extensión</h3>
    <p>Euclides: <em>"aquello que no tiene partes"</em>.<br>
    Solo posición. Sin longitud, anchura ni profundidad.</p>
  </div>
  ${cpcHTML('pu',[
    '¿Cómo introduce el texto escolar de 5° básico el concepto de punto? ¿Y el de 7°? ¿Qué diferencias observas?',
    '¿Qué error frecuente cometen los estudiantes al confundir el símbolo gráfico del punto con el objeto geométrico?',
    '¿Cómo explicarías a tus futuros alumnos que el punto "existe" pero no ocupa espacio?',
    '¿En qué nivel escolar es apropiado introducir la definición euclidiana formal?'
  ])}
  <div class="slbl">Visualización didáctica</div>
  <div class="cwrap">
    <div class="brow">
      <button class="btn on" id="bpa" onclick="tAnim('pu')">⏸ Animación</button>
      <button class="btn clr sm" onclick="st.pts=[];draw()">✕ Limpiar</button>
    </div>
    <label>Radio visual <span class="vv" id="szv">6</span> px &nbsp;<span style="font-size:15px;color:var(--muted)">(tamaño real = 0)</span></label>
    <input type="range" id="szr" min="2" max="18" value="6" oninput="document.getElementById('szv').textContent=this.value;if(!st.an)dPunto()">
    <p style="font-size:16px;color:var(--sub);margin-bottom:7px">Haz clic en el lienzo para registrar puntos y ver sus coordenadas.</p>
    <div class="pbox" id="ptinfo"><b>Sin puntos aún.</b><br>Haz clic en el lienzo.</div>
  </div>
  <div class="div"></div>
  <div class="slbl">Análisis curricular</div>
  <div class="cwrap">
    <div class="blk"><div class="bt">Bases Curriculares (5° básico)</div><div class="bb">El punto se introduce como noción intuitiva, sin definición formal. Referencia: ubicación en el plano.</div></div>
    <div class="blk warn"><div class="bt">Error frecuente en estudiantes</div><div class="bb">Confundir el "punto" geométrico (sin extensión) con el "punto" físico dibujado en papel (que sí ocupa espacio).</div></div>
    <div class="blk example"><div class="bt">Propiedades clave</div><div class="bb"><b>Dimensión:</b> 0 &nbsp;|&nbsp; <b>Extensión:</b> ninguna<br><b>Define:</b> posición exacta en el espacio</div></div>
  </div>`;
  st.pts=[];st.an=true;st.t=0;cv.onclick=ePunto;aLoop('pu');
}
function ePunto(e){const r=cv.getBoundingClientRect();const x=e.clientX-r.left,y=e.clientY-r.top;st.pts.push({x,y});const cx=Math.round(x-cv.width/2),cy=Math.round(cv.height/2-y);document.getElementById('ptinfo').innerHTML=`<b>Punto P${st.pts.length}</b><br>Coordenadas: (<b>${cx}</b>, <b>${cy}</b>)<br><span style="color:var(--muted)">Solo posición. Sin extensión.</span>`;if(!st.an)dPunto();}
function dPunto(){
  const W=cv.width,H=cv.height,t=st.t||0;
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#fafafe';ctx.fillRect(0,0,W,H);grid();
  ctx.strokeStyle='#d0ccf0';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();
  ctx.font='13px Segoe UI';ctx.fillStyle=MU;ctx.fillText('x',W-13,H/2-6);ctx.fillText('y',W/2+6,13);
  const sz=parseInt(document.getElementById('szr')?.value||6);
  const pulse=st.an?(sz+3*Math.sin(t*2)):sz;
  dot(W/2,H/2,pulse,V2);
  if(st.an){ctx.beginPath();ctx.arc(W/2,H/2,pulse+5+4*Math.abs(Math.sin(t)),0,Math.PI*2);ctx.strokeStyle=V2+'40';ctx.lineWidth=1.5;ctx.stroke();}
  ctx.font='bold 15px Segoe UI';ctx.fillStyle=V1;ctx.fillText('O(0,0)',W/2+pulse+4,H/2-4);
  (st.pts||[]).forEach((p,i)=>{dot(p.x,p.y,sz,V1);ctx.font='13px Segoe UI';ctx.fillStyle=V1;ctx.fillText(`P${i+1}(${Math.round(p.x-W/2)},${Math.round(H/2-p.y)})`,p.x+sz+3,p.y-3);});
  // didactic note
  ctx.fillStyle='rgba(238,237,254,0.9)';ctx.fillRect(8,H-42,W-16,34);
  ctx.strokeStyle=VB;ctx.lineWidth=1;ctx.strokeRect(8,H-42,W-16,34);
  ctx.font='13px Segoe UI';ctx.fillStyle=V1;
  ctx.fillText('🎓 Para el docente: el tamaño visual del punto es una convención gráfica.',14,H-26);
  ctx.fillText('   El objeto geométrico no tiene extensión — solo posición.',14,H-12);
}

/* ════════════════════════════════════════
   II. LÍNEA
════════════════════════════════════════ */
function bLinea(){
  document.getElementById('side').innerHTML=`
  <div class="dbox">
    <div class="dlbl">Definición — Línea (Dim. 1)</div>
    <h3>Conjunto continuo de puntos</h3>
    <p>Recorrible en exactamente dos sentidos. Sin ancho.<br>Tipos: <em>infinita, semiinfinita, finita, cerrada.</em></p>
  </div>
  ${cpcHTML('li',[
    '¿Cómo distingue el currículum escolar entre "línea", "recta" y "segmento"? ¿En qué curso aparece cada término?',
    '¿Por qué los estudiantes suelen confundir "línea" con "segmento"? ¿Qué representación favorece esa confusión?',
    'Diseña una pregunta de aula que obligue a un estudiante de 6° básico a diferenciar los cuatro tipos de línea.',
    '¿Qué dificultades cognitivas aparecen al introducir el concepto de "infinito" en la línea?'
  ])}
  <div class="slbl">Tipo de línea</div>
  <div class="cwrap">
    <div class="brow">
      <button class="btn on" id="lti" onclick="sL('i')">Infinita</button>
      <button class="btn"    id="lts" onclick="sL('s')">Semiinfinita</button>
      <button class="btn"    id="ltf" onclick="sL('f')">Finita</button>
      <button class="btn"    id="ltc" onclick="sL('c')">Cerrada</button>
    </div>
    <div class="brow"><button class="btn on" id="bla" onclick="tAnim('li')">⏸ Animación</button></div>
    <label>Grosor <span class="vv" id="lwv">2</span> px</label>
    <input type="range" id="lwr" min="1" max="6" value="2" oninput="document.getElementById('lwv').textContent=this.value;if(!st.an)dLinea()">
    <div class="pbox" id="linfo"></div>
  </div>
  <div class="div"></div>
  <div class="slbl">Análisis curricular</div>
  <div class="cwrap">
    <div class="blk warn"><div class="bt">Error frecuente en estudiantes</div><div class="bb">Usar "línea" y "segmento" como sinónimos. El texto escolar suele introducir "segmento" antes que "línea infinita", reforzando esta confusión.</div></div>
    <div class="blk example"><div class="bt">Propiedades clave</div><div class="bb"><b>Dimensión:</b> 1 &nbsp;|&nbsp; <b>Extensión:</b> solo longitud<br><b>Sin:</b> ancho ni profundidad</div></div>
  </div>`;
  st.lt='i';st.an=true;st.t=0;sLInfo();aLoop('li');
}
const LINFO={
  i:'<b>Línea infinita:</b> sin principio ni fin. Flechas en ambos extremos. Introducida formalmente en 7° básico.',
  s:'<b>Rayo (semiinfinita):</b> origen fijo, extensión infinita en una dirección. Aparece en geometría analítica.',
  f:'<b>Segmento:</b> dos extremos A y B. Extensión finita y medible. Es el más trabajado en ed. primaria.',
  c:'<b>Curva cerrada:</b> regresa a su inicio, sin extremos. Ej: circunferencia. Clave para perímetro.'
};
function sL(t){st.lt=t;['i','s','f','c'].forEach(k=>document.getElementById('lt'+k)?.classList.remove('on'));document.getElementById('lt'+t)?.classList.add('on');sLInfo();if(!st.an)dLinea();}
function sLInfo(){const e=document.getElementById('linfo');if(e)e.innerHTML=LINFO[st.lt];}
function dLinea(){
  const W=cv.width,H=cv.height,t=st.t||0,lw=parseInt(document.getElementById('lwr')?.value||2),cy=H/2;
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#fafafe';ctx.fillRect(0,0,W,H);grid();
  ctx.strokeStyle=V2;ctx.lineWidth=lw;ctx.setLineDash([]);
  if(st.lt==='i'){
    ctx.beginPath();ctx.moveTo(0,cy);ctx.lineTo(W,cy);ctx.stroke();arr(0,cy,-1);arr(W,cy,1);
    if(st.an){const dx=((t*70)%(W+40))-20;dot(dx,cy,5,V1);}
    ctx.font='14px Segoe UI';ctx.fillStyle=MU;ctx.fillText('Línea infinita — sin principio ni fin',12,cy-20);
  }else if(st.lt==='s'){
    const ox=80;ctx.beginPath();ctx.moveTo(ox,cy);ctx.lineTo(W,cy);ctx.stroke();arr(W,cy,1);dot(ox,cy,5,V1);
    ctx.font='bold 14px Segoe UI';ctx.fillStyle=V2;ctx.fillText('A',ox-4,cy-12);
    if(st.an){const dx=ox+((t*60)%(W-ox-20));dot(dx,cy,4,V3);}
    ctx.font='14px Segoe UI';ctx.fillStyle=MU;ctx.fillText('Rayo: origen A definido, extensión infinita →',12,cy-20);
  }else if(st.lt==='f'){
    const ax=W*0.2,bx=W*0.8;ctx.beginPath();ctx.moveTo(ax,cy);ctx.lineTo(bx,cy);ctx.stroke();
    dot(ax,cy,5,V1);dot(bx,cy,5,V1);
    ctx.font='bold 14px Segoe UI';ctx.fillStyle=V2;ctx.fillText('A',ax-4,cy-12);ctx.fillText('B',bx-4,cy-12);
    const mx=(ax+bx)/2,r=st.an?(3+2*Math.sin(t*3)):3;dot(mx,cy,r,V2+'99');
    ctx.setLineDash([4,4]);ctx.strokeStyle='#bbb';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(ax,cy+22);ctx.lineTo(bx,cy+22);ctx.stroke();ctx.setLineDash([]);
    ctx.font='13px Segoe UI';ctx.fillStyle=MU;ctx.fillText(`AB = ${Math.round(bx-ax)} px`,mx-24,cy+36);
    ctx.fillText('Segmento AB — extensión finita y medible',12,cy-20);
  }else{
    const cx=W/2,ry=H*0.26,rx=W*0.28;ctx.beginPath();ctx.ellipse(cx,H/2,rx,ry,0,0,Math.PI*2);ctx.stroke();
    if(st.an){const a=t*1.2;dot(cx+rx*Math.cos(a),H/2+ry*Math.sin(a),5,V1);}
    ctx.font='14px Segoe UI';ctx.fillStyle=MU;ctx.fillText('Curva cerrada — regresa a su punto de inicio',12,22);
  }
  ctx.fillStyle='rgba(238,237,254,0.9)';ctx.fillRect(8,H-42,W-16,34);
  ctx.strokeStyle=VB;ctx.lineWidth=1;ctx.strokeRect(8,H-42,W-16,34);
  ctx.font='13px Segoe UI';ctx.fillStyle=V1;ctx.fillText('🎓 Para el docente: identificar qué tipo de línea usa cada nivel del currículum',14,H-26);ctx.fillText('   ayuda a planificar la progresión conceptual adecuada.',14,H-12);
}

/* ════════════════════════════════════════
   III. PLANO
════════════════════════════════════════ */
function bPlano(){
  document.getElementById('side').innerHTML=`
  <div class="dbox">
    <div class="dlbl">Definición — Plano (Dim. 2)</div>
    <h3>Extensión infinita bidimensional</h3>
    <p>Conjunto de puntos con dos dimensiones (largo y ancho) y sin espesor.<br>Dimensión: <em>2</em></p>
  </div>
  ${cpcHTML('pl',[
    '¿Cuándo y cómo introduce el currículum el concepto de plano cartesiano? ¿Qué relación tiene con el concepto de plano geométrico?',
    '¿Qué dificultades tienen los estudiantes para comprender que el plano tiene "espesor cero"?',
    '¿Cómo relacionarías el concepto de plano con la enseñanza de coordenadas en 6° básico?',
    'Diseña una situación concreta del entorno que permita introducir el plano en 5° básico.'
  ])}
  <div class="slbl">Vista</div>
  <div class="cwrap">
    <div class="brow">
      <button class="btn on" id="pv2" onclick="sPV('2')">Plano 2D</button>
      <button class="btn"    id="pv3" onclick="sPV('3')">Perspectiva</button>
      <button class="btn"    id="pve" onclick="sPV('e')">Explorar</button>
    </div>
    <div class="brow"><button class="btn on" id="bpla" onclick="tAnim('pl')">⏸ Animación</button><button class="btn clr sm" onclick="st.pp=[];draw()">✕ Limpiar</button></div>
    <label>Cuadrícula <span class="vv" id="gdv">50</span></label>
    <input type="range" id="gdr" min="25" max="90" value="50" oninput="document.getElementById('gdv').textContent=this.value;if(!st.an)dPlano()">
  </div>
  <div class="div"></div>
  <div class="slbl">Análisis curricular</div>
  <div class="cwrap">
    <div class="blk warn"><div class="bt">Error frecuente en estudiantes</div><div class="bb">Confundir el "plano geométrico" (infinito, sin espesor) con una "superficie plana" física como una mesa o hoja de papel.</div></div>
    <div class="blk example"><div class="bt">Propiedades clave</div><div class="bb"><b>Dimensión:</b> 2 &nbsp;|&nbsp; <b>Extensión:</b> largo y ancho infinitos<br><b>Espesor:</b> cero</div></div>
  </div>`;
  st.pv='2';st.an=true;st.t=0;st.pp=[];cv.onclick=null;aLoop('pl');
}
function sPV(v){st.pv=v;['2','3','e'].forEach(k=>document.getElementById('pv'+k)?.classList.remove('on'));document.getElementById('pv'+v)?.classList.add('on');cv.onclick=v==='e'?ePP:null;if(!st.an)dPlano();}
function ePP(e){const r=cv.getBoundingClientRect();st.pp.push({x:e.clientX-r.left,y:e.clientY-r.top});if(!st.an)dPlano();}
function dPlano(){
  const W=cv.width,H=cv.height,t=st.t||0,gd=parseInt(document.getElementById('gdr')?.value||50);
  ctx.clearRect(0,0,W,H);
  if(st.pv==='2'){
    ctx.fillStyle='#fafafe';ctx.fillRect(0,0,W,H);grid(gd,'#eeedfe');
    ctx.strokeStyle='#c0bcf0';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();
    ctx.font='13px Segoe UI';ctx.fillStyle=MU;ctx.fillText('x',W-12,H/2-7);ctx.fillText('y',W/2+6,13);ctx.fillText('O',W/2+3,H/2-5);
    if(st.an){const px=W/2+130*Math.cos(t),py=H/2+90*Math.sin(t*1.2);dot(px,py,5,V2);ctx.font='13px Segoe UI';ctx.fillStyle=V1;ctx.fillText(`(${Math.round(px-W/2)},${Math.round(H/2-py)})`,px+8,py-5);}
  }else if(st.pv==='3'){
    ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
    const vx=W/2,vy=H*0.3,base=H*0.85;
    ctx.strokeStyle=VB;ctx.lineWidth=0.7;
    const cols=14;for(let i=-cols;i<=cols;i++){const bx=W/2+i*(W/(cols*1.6));ctx.beginPath();ctx.moveTo(bx,base);ctx.lineTo(vx,vy);ctx.stroke();}
    for(let j=1;j<=9;j++){const rr=j/9,yy=vy+rr*(base-vy),hw=(W*0.65)*rr;ctx.beginPath();ctx.moveTo(vx-hw/2,yy);ctx.lineTo(vx+hw/2,yy);ctx.stroke();}
    ctx.fillStyle='rgba(200,195,240,0.18)';ctx.beginPath();ctx.moveTo(vx-W*0.32,base);ctx.lineTo(vx,vy);ctx.lineTo(vx+W*0.32,base);ctx.closePath();ctx.fill();
    ctx.font='bold 15px Segoe UI';ctx.fillStyle=V1;ctx.fillText('Plano en perspectiva',vx-72,vy-16);
    if(st.an){const a=t*0.5,rr=W*0.22;dot(vx+rr*Math.cos(a)*0.8,vy+(base-vy)*0.5+rr*Math.sin(a)*0.25,4,V2);}
  }else{
    ctx.fillStyle='#fafafe';ctx.fillRect(0,0,W,H);grid(gd,'#eeedfe');
    ctx.strokeStyle='#c0bcf0';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();
    (st.pp||[]).forEach((p,i)=>{dot(p.x,p.y,5,V2);ctx.font='13px Segoe UI';ctx.fillStyle=V1;ctx.fillText(`P${i+1}(${Math.round(p.x-W/2)},${Math.round(H/2-p.y)})`,p.x+7,p.y-4);});
  }
  ctx.fillStyle='rgba(238,237,254,0.9)';ctx.fillRect(8,H-42,W-16,34);ctx.strokeStyle=VB;ctx.lineWidth=1;ctx.strokeRect(8,H-42,W-16,34);
  ctx.font='13px Segoe UI';ctx.fillStyle=V1;ctx.fillText('🎓 Para el docente: distinguir entre el plano geométrico (abstracto, infinito)',14,H-26);ctx.fillText('   y superficies planas físicas es clave para evitar concepciones erróneas.',14,H-12);
}

/* ════════════════════════════════════════
   IV. V POSTULADO
════════════════════════════════════════ */
function bPost(){
  document.getElementById('side').innerHTML=`
  <div class="dbox">
    <div class="dlbl">V Postulado de Euclides (~300 a.C.)</div>
    <h3>El postulado de las paralelas</h3>
    <p>Si una transversal corta dos rectas y los ángulos interiores del mismo lado suman menos de 180°, las rectas se cortan de ese lado.</p>
  </div>
  ${cpcHTML('po',[
    '¿Por qué el V Postulado fue históricamente el más cuestionado de los Elementos de Euclides?',
    '¿Cómo definirías "rectas paralelas" a estudiantes de 5° básico sin usar el lenguaje formal del postulado?',
    'Analiza cómo define "rectas paralelas" el texto escolar de 5°, 6° y 7° básico. ¿Qué diferencias encuentras?',
    '¿Qué implica pedagógicamente que existan geometrías no euclidianas donde el V Postulado no se cumple?'
  ])}
  <div class="slbl">Exploración didáctica</div>
  <div class="cwrap">
    <div class="brow">
      <button class="btn on" id="ps0" onclick="sPS(0)">Enunciado</button>
      <button class="btn"    id="ps1" onclick="sPS(1)">Paralelas</button>
      <button class="btn"    id="ps2" onclick="sPS(2)">Convergentes</button>
      <button class="btn"    id="ps3" onclick="sPS(3)">Explorar</button>
    </div>
    <label>Ángulo α = <span class="vv" id="angv">30</span>°</label>
    <input type="range" id="angr" min="5" max="85" value="30" oninput="onAng()">
    <div class="pbox" id="anginfo"></div>
  </div>
  <div class="div"></div>
  <div class="slbl">Secuencia didáctica recomendada</div>
  <div class="cwrap">
    <div class="stbox ast" id="sd0" onclick="sPS(0)"><b>1. Enunciado original</b>Lee el postulado y visualiza transversal, ángulos y rectas.</div>
    <div class="stbox" id="sd1" onclick="sPS(1)"><b>2. Caso paralelas</b>Ángulos interiores suman 180° → rectas no se cortan.</div>
    <div class="stbox" id="sd2" onclick="sPS(2)"><b>3. Caso convergente</b>Suma menor que 180° → rectas se cortan.</div>
    <div class="stbox" id="sd3" onclick="sPS(3)"><b>4. Exploración libre</b>Mueve el slider y observa la configuración resultante.</div>
  </div>`;
  st.ps=0;st.an=true;st.t=0;updAng();aLoop('po');
}
function sPS(i){st.ps=i;[0,1,2,3].forEach(k=>{document.getElementById('ps'+k)?.classList.remove('on');document.getElementById('sd'+k)?.classList.remove('ast');});document.getElementById('ps'+i)?.classList.add('on');document.getElementById('sd'+i)?.classList.add('ast');if(!st.an)dPost();}
function onAng(){document.getElementById('angv').textContent=document.getElementById('angr').value;updAng();if(!st.an)dPost();}
function updAng(){
  const a=parseInt(document.getElementById('angr')?.value||30);
  const el=document.getElementById('anginfo');if(!el)return;
  const par=a===90;
  el.innerHTML=`<b>α = ${a}°, β = ${180-a}°</b><br>Suma = <b>180°</b> → rectas <b>${par?'paralelas':'se cortan'}</b>`;
  el.className='pbox '+(par?'gl':'gr');
}
function dPost(){
  const W=cv.width,H=cv.height,t=st.t||0,ang=parseInt(document.getElementById('angr')?.value||30);
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);grid(60,'#f4f3ff');
  if(st.ps===0){
    dPBase(W,H,45,t);
    ctx.fillStyle='rgba(248,247,255,0.95)';ctx.fillRect(10,10,W-20,134);ctx.strokeStyle=VB;ctx.lineWidth=1;ctx.strokeRect(10,10,W-20,134);
    const ls=['"Si una transversal corta dos rectas',' y los ángulos interiores de un lado',' suman menos de 180°,',' entonces las rectas se cortan',' de ese mismo lado."','','— Euclides, Elementos (~300 a.C.)'];
    ctx.font='15px Segoe UI';ctx.fillStyle=V1;ls.forEach((l,i)=>ctx.fillText(l,20,33+i*16));
  }else if(st.ps===1){
    dParalelas(W,H,t);ctx.font='bold 15px Segoe UI';ctx.fillStyle=GR;ctx.fillText('Rectas paralelas — ángulos interiores suman 180°',14,22);
  }else if(st.ps===2){
    dConverge(W,H,t);ctx.font='bold 15px Segoe UI';ctx.fillStyle=RE;ctx.fillText('Rectas convergentes — suma < 180°, se cortan',14,22);
  }else{
    dPBase(W,H,ang,t);
    ctx.font='bold 15px Segoe UI';ctx.fillStyle=ang===90?GR:RE;
    ctx.fillText(`α = ${ang}°   β = ${180-ang}°   → ${ang===90?'PARALELAS':'SE CORTAN'}`,14,22);
  }
  ctx.fillStyle='rgba(238,237,254,0.9)';ctx.fillRect(8,H-42,W-16,34);ctx.strokeStyle=VB;ctx.lineWidth=1;ctx.strokeRect(8,H-42,W-16,34);
  ctx.font='13px Segoe UI';ctx.fillStyle=V1;ctx.fillText('🎓 Para el docente: el V Postulado fue objeto de debate por ~2000 años.',14,H-26);ctx.fillText('   Su negación da origen a geometrías no euclidianas (Lobachevski, Riemann).',14,H-12);
}
function dPBase(W,H,ang,t){
  const cy1=H*0.38,cy2=H*0.65,rad=ang*Math.PI/180,tx=W*0.25;
  ctx.strokeStyle=V2;ctx.lineWidth=2;ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(0,cy1);ctx.lineTo(W*0.75,cy1);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,cy2);ctx.lineTo(W*0.75,cy2);ctx.stroke();
  const dy=cy2-cy1,dx=dy/Math.tan(rad),x1=tx,y1=cy1-20,x2=tx+dx,y2=cy2+20;
  ctx.strokeStyle=V1;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  const ix1=tx+(cy1-y1)*dx/(y2-y1),ix2=tx+(cy2-y1)*dx/(y2-y1);
  dot(ix1,cy1,4,V1);dot(ix2,cy2,4,V1);
  ctx.strokeStyle=RE;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(ix1,cy1,22,Math.PI/2,Math.PI/2+rad);ctx.stroke();
  ctx.beginPath();ctx.arc(ix2,cy2,22,-Math.PI/2,-Math.PI/2+(Math.PI-rad));ctx.stroke();
  ctx.font='bold 15px Segoe UI';ctx.fillStyle=RE;ctx.fillText(`α=${ang}°`,ix1+16,cy1+14);ctx.fillText(`β=${180-ang}°`,ix2+16,cy2-6);
}
function dParalelas(W,H,t){
  const cy1=H*0.38,cy2=H*0.65,tx=W*0.3;
  ctx.strokeStyle=V2;ctx.lineWidth=2;ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(0,cy1);ctx.lineTo(W,cy1);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,cy2);ctx.lineTo(W,cy2);ctx.stroke();
  ctx.strokeStyle=V1;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(tx,cy1-30);ctx.lineTo(tx,cy2+30);ctx.stroke();
  dot(tx,cy1,4,V1);dot(tx,cy2,4,V1);
  const s=14;ctx.strokeStyle=GR;ctx.lineWidth=1.5;ctx.strokeRect(tx,cy1,s,s);ctx.strokeRect(tx,cy2-s,s,s);
  ctx.font='13px Segoe UI';ctx.fillStyle=GR;ctx.fillText('90°',tx+s+3,cy1+11);ctx.fillText('90°',tx+s+3,cy2-3);
  const dx=st.an?((t*40)%180):90;
  ctx.strokeStyle=V2+'55';ctx.lineWidth=1;ctx.setLineDash([5,5]);
  ctx.beginPath();ctx.moveTo(W*0.6,cy1);ctx.lineTo(W*0.6+dx,cy1);ctx.stroke();
  ctx.beginPath();ctx.moveTo(W*0.6,cy2);ctx.lineTo(W*0.6+dx,cy2);ctx.stroke();ctx.setLineDash([]);
  ctx.font='13px Segoe UI';ctx.fillStyle=MU;ctx.fillText('Las rectas nunca se cortan → son paralelas',W*0.6+8,(cy1+cy2)/2);
}
function dConverge(W,H,t){
  const ix=W*0.82,iy=H/2;
  ctx.strokeStyle=V2;ctx.lineWidth=2;ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(0,H*0.38);ctx.lineTo(ix,iy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,H*0.65);ctx.lineTo(ix,iy);ctx.stroke();
  const pulse=st.an?(5+3*Math.sin(t*3)):5;dot(ix,iy,pulse,RE);
  ctx.font='bold 15px Segoe UI';ctx.fillStyle=RE;ctx.fillText('Punto de intersección',ix-78,iy-13);
  ctx.strokeStyle=V1;ctx.lineWidth=2;const tx=W*0.28;ctx.beginPath();ctx.moveTo(tx-20,H*0.25);ctx.lineTo(tx+40,H*0.78);ctx.stroke();
}

/* ════════════════════════════════════════
   V. EVALUACIÓN DOCENTE
════════════════════════════════════════ */
const QS=[
  {q:'Un estudiante de 6° básico dice: "el punto es muy pequeño, pero existe porque lo veo en el papel". Como docente, ¿qué respuesta es más adecuada pedagógicamente?',
   o:['Decirle que tiene razón, el punto sí existe físicamente','Explicar que lo que ve es la representación gráfica; el punto geométrico no tiene extensión','Ignorar el comentario y continuar la clase','Decirle que el punto no existe en ningún sentido'],a:1,
   ok:'Correcto. El docente debe distinguir entre representación gráfica y objeto geométrico, sin invalidar la percepción del estudiante.',
   no:'Incorrecto. El docente CPC debe clarificar la distinción entre representación y objeto matemático abstracto.'},
  {q:'¿En qué nivel del currículum chileno se introduce formalmente el concepto de "recta" (línea infinita) según las Bases Curriculares?',
   o:['3° básico','5° básico','7° básico','1° medio'],a:2,
   ok:'Correcto. La recta como objeto formal aparece en 7° básico, aunque se trabaja intuitivamente antes.',
   no:'Incorrecto. La recta como objeto formal se introduce en 7° básico en las Bases Curriculares.'},
  {q:'Según el V Postulado de Euclides, si los ángulos interiores del mismo lado suman exactamente 180°, las rectas son...',
   o:['Convergentes','Paralelas','Perpendiculares','Secantes'],a:1,
   ok:'Correcto. Suma = 180° implica que las rectas no se cortarán: son paralelas.',
   no:'Incorrecto. Cuando la suma es exactamente 180°, las rectas son paralelas.'},
  {q:'Un futuro docente diseña una actividad donde pide a sus alumnos que "dibujen un punto muy pequeño". ¿Qué error conceptual subyace en esta instrucción?',
   o:['Ninguno, es una instrucción adecuada','Confunde el objeto geométrico (sin extensión) con su representación gráfica','El punto no puede dibujarse bajo ninguna circunstancia','El punto siempre debe dibujarse grande'],a:1,
   ok:'Correcto. La instrucción confunde el objeto abstracto (punto geométrico) con su representación convencional.',
   no:'Incorrecto. El problema es que "muy pequeño" sigue siendo una extensión; el punto geométrico no tiene tamaño.'},
  {q:'¿Cuál de estas afirmaciones sobre el plano geométrico es correcta desde el punto de vista matemático?',
   o:['El plano tiene un espesor muy pequeño pero medible','El plano es finito si lo delimitamos con bordes','El plano tiene dos dimensiones y espesor igual a cero','El plano es igual a una superficie plana física'],a:2,
   ok:'Correcto. El plano es un objeto bidimensional con espesor exactamente cero, de extensión infinita.',
   no:'Incorrecto. El plano tiene dos dimensiones (largo y ancho) y espesor estrictamente igual a cero.'},
  {q:'Para enseñar la distinción entre "segmento", "rayo" y "recta" en 6° básico, ¿qué estrategia es más coherente con el CPC?',
   o:['Dar las tres definiciones formales simultáneamente','Trabajar con objetos del entorno y progresivamente formalizar cada tipo','Pedir que memoricen las definiciones del texto escolar','Evitar el tema hasta 7° básico'],a:1,
   ok:'Correcto. El CPC implica partir de contextos concretos y escalar hacia la formalización progresiva.',
   no:'Incorrecto. El Conocimiento Pedagógico del Contenido implica conectar el saber disciplinar con estrategias didácticas contextualizadas.'},
];
let qs={q:0,sc:0,dn:false};
function bQuiz(){qs={q:0,sc:0,dn:false};rQ();}
function dQcv(){
  const W=cv.width,H=cv.height;ctx.clearRect(0,0,W,H);ctx.fillStyle='#fafafe';ctx.fillRect(0,0,W,H);grid(60,'#eeedfe');
  ctx.font='bold 120px Segoe UI';ctx.fillStyle=V2+'0d';ctx.fillText('?',W/2-50,H/2+36);
  ctx.font='15px Segoe UI';ctx.fillStyle=MU;ctx.fillText('Evaluación con enfoque CPC — responde en el panel →',W/2-165,H/2+80);
}
function rQ(){
  const s=document.getElementById('side');
  if(qs.q>=QS.length){
    const p=Math.round(qs.sc/QS.length*100);
    const m=p>=80?'Excelente comprensión del CPC en geometría.':p>=60?'Buen avance. Revisa los aspectos didácticos.':'Profundiza en la relación entre saber disciplinar y saber didáctico.';
    s.innerHTML=`<div class="dbox"><div class="dlbl">Evaluación CPC — Resultado</div><h3>Evaluación completada</h3></div>
    <div class="sbox"><div class="big">${qs.sc}/${QS.length}</div><div class="pct">${p}%</div><p>${m}</p></div>
    <div style="padding:0 13px"><button class="btn" style="width:100%;margin-top:8px" onclick="bQuiz();dQcv()">↺ Reintentar</button></div>`;return;
  }
  const q=QS[qs.q],pc=Math.round(qs.q/QS.length*100);
  s.innerHTML=`<div class="dbox" style="padding:10px 15px"><div class="dlbl">Evaluación CPC — Pregunta ${qs.q+1} de ${QS.length}</div></div>
  <div style="padding:9px 13px 4px"><div class="pbar"><div class="pfill" style="width:${pc}%"></div></div></div>
  <div class="qwrap"><div class="qq">${q.q}</div>
  <div class="qopts">${q.o.map((o,i)=>`<button class="qopt" id="qo${i}" onclick="aQ(${i})">${String.fromCharCode(65+i)}. ${o}</button>`).join('')}</div>
  <div id="qfb"></div><div id="qnx"></div></div>`;
}
function aQ(i){if(qs.dn)return;qs.dn=true;const q=QS[qs.q],ok=i===q.a;if(ok)qs.sc++;document.querySelectorAll('.qopt').forEach((el,j)=>{el.disabled=true;if(j===q.a)el.classList.add('ok');else if(j===i)el.classList.add('no');});document.getElementById('qfb').innerHTML=`<div class="qfb ${ok?'ok':'no'}">${ok?'✓ '+q.ok:'✗ '+q.no}</div>`;document.getElementById('qnx').innerHTML=`<button class="btn qnx" onclick="nQ()">${qs.q+1<QS.length?'Siguiente →':'Ver resultado'}</button>`;}
function nQ(){qs.q++;qs.dn=false;rQ();}

/* ANIM */
function aLoop(who){function lp(){st.t=(st.t||0)+0.025;if(who==='pu'&&tab===0)dPunto();else if(who==='li'&&tab===1)dLinea();else if(who==='pl'&&tab===2)dPlano();else if(who==='po'&&tab===3)dPost();else return;af=requestAnimationFrame(lp);}af=requestAnimationFrame(lp);}
function tAnim(who){st.an=!st.an;const ids={pu:'bpa',li:'bla',pl:'bpla'};const btn=document.getElementById(ids[who]);if(btn){btn.textContent=st.an?'⏸ Animación':'▶ Animación';btn.classList.toggle('on',st.an);}if(st.an)aLoop(who);else{if(af)cancelAnimationFrame(af);af=null;draw();}}

function buildSide(){if(tab===0)bPunto();else if(tab===1)bLinea();else if(tab===2)bPlano();else if(tab===3)bPost();else bQuiz();}
window.addEventListener('load',()=>{resize();buildSide();});
</script>
